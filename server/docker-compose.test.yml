version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: judge0
      POSTGRES_PASSWORD: judge0pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --requirepass redispass

  judge0:
    image: judge0/judge0:latest
    privileged: true
    ports:
      - "2358:2358"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: judge0
      POSTGRES_PASSWORD: judge0pass
      REDIS_HOST: redis
      REDIS_PASSWORD: redispass
      RAILS_ENV: production
    depends_on:
      - db
      - redis
    volumes:
      - ./isolate:/isolate

volumes:
  pgdata:
