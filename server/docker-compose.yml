services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://studyadmin:studypass123@postgres_db:5432/studyroom_db?schema=public
      JUDGE0_URL: https://ce.judge0.com
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      REDIS_HOST: redis
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: studyadmin
      POSTGRES_PASSWORD: studypass123
      POSTGRES_DB: studyroom_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyadmin -d studyroom_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studyroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  judge0-server:
    image: judge0/judge0:1.13.1
    profiles:
      - judge0
    privileged: true
    restart: unless-stopped
    ports:
      - "2358:2358"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:1.13.1
    profiles:
      - judge0
    command: ["./scripts/workers"]
    privileged: true
    restart: unless-stopped
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-server
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:15-alpine
    profiles:
      - judge0
    restart: unless-stopped
    env_file:
      - judge0.conf
    volumes:
      - judge0_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7.2.4
    profiles:
      - judge0
    restart: unless-stopped
    env_file:
      - judge0.conf
    command: ["bash", "-c", "docker-entrypoint.sh --appendonly no --requirepass \"$${REDIS_PASSWORD}\""]

volumes:
  postgres_data:
  judge0_data:
  redis-data:
