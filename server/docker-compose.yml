services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://studyadmin:studypass123@postgres_db:5432/studyroom_db?schema=public
      JUDGE0_URL: http://judge0-server:2358
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: studyadmin
      POSTGRES_PASSWORD: studypass123
      POSTGRES_DB: studyroom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyadmin -d studyroom_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  judge0-server:
    image: judge0/judge0:1.13.1
    profiles:
      - judge0
    privileged: true
    restart: unless-stopped
    ports:
      - "2358:2358"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:1.13.1
    profiles:
      - judge0
    command: ["./scripts/workers"]
    privileged: true
    restart: unless-stopped
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    depends_on:
      - judge0-server
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:15-alpine
    profiles:
      - judge0
    restart: unless-stopped
    env_file:
      - judge0.conf
    volumes:
      - judge0_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7.2.4
    profiles:
      - judge0
    restart: unless-stopped
    env_file:
      - judge0.conf
    command: ["bash", "-c", "docker-entrypoint.sh --appendonly no --requirepass \"$${REDIS_PASSWORD}\""]

volumes:
  postgres_data:
  judge0_data:
